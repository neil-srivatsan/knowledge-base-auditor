# Alembic configuration for kb_audit PostgreSQL migrations.
#
# This file is for the PostgreSQL backend only.
# SQLite remains the default runtime backend and is not managed by Alembic.
#
# Usage:
#   KB_AUDIT_POSTGRES_URL=postgresql://user:pass@host/dbname \
#       alembic upgrade head
#
# The database URL is read from the KB_AUDIT_POSTGRES_URL environment variable
# (or KB_AUDIT_POSTGRES_TEST_URL as a fallback) in migrations/env.py.
# The sqlalchemy.url value below is a placeholder; set it here only if you
# prefer not to use an environment variable.

[alembic]
script_location = migrations
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40

# Leave empty to use KB_AUDIT_POSTGRES_URL / KB_AUDIT_POSTGRES_TEST_URL env vars.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
